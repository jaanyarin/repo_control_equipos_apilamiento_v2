# ---- Datasource ----
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/repo_control_equipos_apilamiento}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:postgres}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=20
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/repo_control_equipos_apilamiento

# ---- Hibernate ORM ----
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true

# ---- Flyway ----
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration

# ---- HTTP ----
quarkus.http.host=0.0.0.0

# ---- CORS ----
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173,http://localhost:5174
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,info

# ---- API ----
quarkus.resteasy-reactive.path=/api/v1
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger

# ---- Logging ----
quarkus.log.level=INFO
quarkus.log.category."com.apilamiento".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# ---- OIDC / Microsoft Entra ID ----
apilamiento.oidc.tenant-id=${OIDC_TENANT_ID}
apilamiento.oidc.client-id=${OIDC_CLIENT_ID}
apilamiento.oidc.client-secret=${OIDC_CLIENT_SECRET}
apilamiento.oidc.redirect-uri=${OIDC_REDIRECT_URI:http://localhost/api/v1/auth/callback}

# ---- JWT ----
mp.jwt.verify.publickey.location=/publickey.pem
mp.jwt.verify.issuer=https://apilamiento.internal
smallrye.jwt.sign.key.location=/privatekey.pem

# Auth login/callback paths are public (handled by @PermitAll in AuthResource)
# All other /api/v1/* endpoints require valid JWT (handled by @RolesAllowed)

# ---- File Upload ----
quarkus.http.body.delete-uploaded-files-on-end=true
quarkus.http.limits.max-body-size=10M
