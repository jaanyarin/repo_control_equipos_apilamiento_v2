# ═══════════════════════════════════════════════════════════════════════════════
# IMPORTANTE – CONFIGURACIÓN DE PUERTOS (NO CAMBIAR)
#
# PostgreSQL se expone en el HOST como puerto 5433 (NO 5432) porque el equipo
# local de desarrollo tiene PostgreSQL 18 instalado localmente como servicio de
# Windows que ocupa el puerto 5432. Si se cambiara a 5432, el contenedor Docker
# entraría en conflicto con el servicio local y los clientes (VS Code, DBeaver,
# pgAdmin, etc.) se conectarían al PostgreSQL local en lugar del de Docker.
#
#   Host:5433  ──→  Contenedor:5432  (NO usar Host:5432)
#
# El backend (Quarkus) se conecta internamente a postgres:5432 (red Docker),
# no al host, por lo que NO necesita cambios de configuración.
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:18
    container_name: apilamiento-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"  # Host:5433 → Container:5432. NO cambiar a 5432 (conflicto con PostgreSQL local)
    environment:
      POSTGRES_DB: repo_control_equipos_apilamiento
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido en .env}
      TZ: America/Lima
    command: ["postgres", "-c", "timezone=America/Lima"]
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repo_control_equipos_apilamiento"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apilamiento-backend
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/repo_control_equipos_apilamiento
      QUARKUS_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido en .env}
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-prod}
      OIDC_TENANT_ID: ${OIDC_TENANT_ID:?OIDC_TENANT_ID requerido en .env}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?OIDC_CLIENT_ID requerido en .env}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?OIDC_CLIENT_SECRET requerido en .env}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost/api/v1/auth/callback}
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apilamiento-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  postgres-data:
